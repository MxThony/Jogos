<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranking Mestre - Copa Saminina</title>

    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>

    <link rel="stylesheet" href="style.css?v=6.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body.tela-tv {
            padding-top: 70px;
            padding-bottom: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .tv-container {
            background: var(--color-white);
            padding: 30px 25px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 4px solid var(--color-yellow);
            box-shadow: none;
            position: relative;
        }

        .tv-acoes {
            position: absolute;
            top: -18px;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .btn-tv-topo {
            pointer-events: all;
            position: absolute;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 3px solid #fff;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: none;
            z-index: 50;
            margin: 0;
            padding: 0;
        }

        .btn-tv-fechar {
            right: -18px;
            background: var(--color-red);
            color: #fff;
        }

        .btn-tv-voltar {
            left: -18px;
            background: var(--color-blue);
            color: #fff;
        }

        .btn-tv-voltar.escondido {
            display: none !important;
        }

        .faixa-transmissao {
            position: fixed;
            left: 0;
            width: 100%;
            background: var(--color-yellow);
            color: var(--color-blue);
            padding: 12px 0;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 2000;
            display: flex;
            white-space: nowrap;
            overflow: hidden;
        }

        .faixa-top {
            top: 0;
            border-bottom: 3px solid #002266;
        }

        .faixa-bottom {
            bottom: 0;
            border-top: 3px solid #002266;
        }

        .marquee-content {
            display: flex;
            animation: rolarTexto 40s linear infinite;
        }

        .marquee-texto {
            padding-right: 50px;
        }

        @keyframes rolarTexto {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .texto-destaque {
            color: var(--color-green);
            text-shadow: 1px 1px 0px #fff;
        }
    </style>
</head>
<body class="tela-tv">

    <div class="faixa-transmissao faixa-top">
        <div class="marquee-content" id="letreiro-cima"></div>
    </div>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo/samininacopa.svg" class="logo-marca" alt="Logo Copa Saminina">
        </div>

        <div class="tv-container">
            <div class="tv-acoes">
                <button class="btn-tv-topo btn-tv-voltar" id="btn-voltar-resultado" onclick="voltarParaResultado()" title="Voltar para o resultado">↩</button>
                <button class="btn-tv-topo btn-tv-fechar" onclick="voltarParaInicio()" title="Voltar para o início">✕</button>
            </div>

            <h2 style="font-size: 24px;">PLACAR OFICIAL 🏆</h2>
            <div id="lista-ranking" class="lista-ranking-container">Carregando craques...</div>

            <hr class="divisor">

            <h3 style="font-size: 20px;">ÚLTIMAS CONQUISTAS 🏅</h3>
            <div id="lista-titulos-recentes" class="lista-ranking-container list-p">Buscando histórico...</div>
        </div>
    </div>

    <div class="faixa-transmissao faixa-bottom">
        <div class="marquee-content" id="letreiro-baixo"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbvleD3CCVEOybvc7B-sKmzL1ugnHiMyk",
            authDomain: "copa-saminina.firebaseapp.com",
            databaseURL: "https://copa-saminina-default-rtdb.firebaseio.com",
            projectId: "copa-saminina",
            storageBucket: "copa-saminina.firebasestorage.app",
            messagingSenderId: "961413845237",
            appId: "1:961413845237:web:4c2b36f903a3f3c0f9f5bc"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const database = firebase.database();
        let infoTop3 = "";
        let infoUltimo = "";

        function atualizarLetreiro() {
            const textoBase = "VOCÊ ESTÁ ACOMPANHANDO A COPA SAMININA AO VIVO • QUEM SERÁ O PRÓXIMO CRAQUE? • DESAFIE SEUS AMIGOS NO TOTEM!";
            let textoCompleto = textoBase;

            if (infoUltimo) {
                textoCompleto += ` • ÚLTIMO NA ARENA: <span class="texto-destaque">${infoUltimo}</span>`;
            }

            if (infoTop3) {
                textoCompleto += ` • TOP 3 GERAL: <span class="texto-destaque">${infoTop3}</span>`;
            }

            const spanHTML = `<span class="marquee-texto">${textoCompleto}</span>`;
            const loopInfinito = spanHTML + spanHTML + spanHTML + spanHTML;

            document.getElementById("letreiro-cima").innerHTML = loopInfinito;
            document.getElementById("letreiro-baixo").innerHTML = loopInfinito;
        }

        database.ref('samininaRanking').on('value', s => {
            let list = [];
            s.forEach(c => {
                if (c.val() && c.val().nome) list.push(c.val());
            });

            list.sort((a, b) =>
                (Number(b.copas) || 0) - (Number(a.copas) || 0) ||
                (Number(b.pontosTotais) || 0) - (Number(a.pontosTotais) || 0)
            );

            const containerRanking = document.getElementById("lista-ranking");

            if (list.length === 0) {
                containerRanking.innerHTML = "<p style='padding: 20px;'>Ainda não há campeões!</p>";
                infoTop3 = "";
            } else {
                containerRanking.innerHTML = list.slice(0, 10).map((j, i) => {
                    let posicao = `${i + 1}º`;
                    let tamanhoFonte = '18px';

                    if (i === 0) {
                        posicao = "🥇";
                        tamanhoFonte = '28px';
                    } else if (i === 1) {
                        posicao = "🥈";
                        tamanhoFonte = '28px';
                    } else if (i === 2) {
                        posicao = "🥉";
                        tamanhoFonte = '28px';
                    }

                    return `
                        <div class="ranking-item">
                            <div class="ranking-pos" style="font-size: ${tamanhoFonte};">${posicao}</div>
                            <img src="${j.avatar || 'img/1.jpg'}" class="ranking-avatar" alt="${j.nome}">
                            <div class="ranking-info">
                                <b>${j.nome}</b><br>
                                <span>${j.copas || 0} Copas | ${j.pontosTotais || 0} Pts</span>
                            </div>
                        </div>
                    `;
                }).join("");

                const top3Array = list.slice(0, 3).map((j, i) => {
                    const medalha = i === 0 ? "🥇" : (i === 1 ? "🥈" : "🥉");
                    return `${medalha} ${j.nome} (${j.copas || 0} COPAS)`;
                });

                infoTop3 = top3Array.join(" • ");
            }

            atualizarLetreiro();
        });

        database.ref('historicoPartidas').orderByChild('timestamp').limitToLast(10).on('value', s => {
            let list = [];
            s.forEach(c => {
                if (c.val() && c.val().nome) list.push(c.val());
            });

            const containerTitulos = document.getElementById("lista-titulos-recentes");

            if (list.length === 0) {
                containerTitulos.innerHTML = "<p style='padding: 10px;'>Aguardando partidas...</p>";
                infoUltimo = "";
            } else {
                const reversa = list.reverse();

                containerTitulos.innerHTML = reversa.map(p => `
                    <div class="ranking-item">
                        <img src="${p.avatar || 'img/1.jpg'}" class="ranking-avatar" alt="${p.nome}">
                        <div class="ranking-info">
                            <b>${p.nome}</b><br>
                            <span>${p.titulo}</span>
                        </div>
                    </div>
                `).join("");

                const ultimo = reversa[0];
                infoUltimo = `${ultimo.nome} - ${ultimo.titulo}`;
            }

            atualizarLetreiro();
        });

        async function entrarEmTelaCheiaRanking() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (e) {
                console.log("Fullscreen bloqueado pelo navegador:", e);
            }
        }

        function voltarParaInicio() {
            window.location.href = "index.html";
        }

        function voltarParaResultado() {
            window.location.href = "index.html?voltarResultado=1";
        }

        const params = new URLSearchParams(window.location.search);

        document.addEventListener("DOMContentLoaded", () => {
            atualizarLetreiro();

            const botaoVoltarResultado = document.getElementById("btn-voltar-resultado");

            if (params.get("origem") !== "resultado") {
                botaoVoltarResultado.classList.add("escondido");
            }

            if (params.get("fs") === "1") {
                entrarEmTelaCheiaRanking();
            }
        });

        window.addEventListener("click", () => {
            if (params.get("fs") === "1" && !document.fullscreenElement) {
                entrarEmTelaCheiaRanking();
            }
        }, { once: true });
    </script>
</body>
</html>
