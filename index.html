<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Saminina - O Conhecimento é Campeão</title>

    <!-- Bibliotecas -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo/samininacopa.svg" class="logo-marca" onclick="verificarSenhaReset()">
        </div>

        <div class="quiz-container">
            
            <!-- TELA: MODO -->
            <div id="tela-modo">
                <h2>Como quer jogar?</h2>
                <div class="botoes-modo">
                    <button onclick="selecionarModo('solo')" class="btn-modo">Carreira Solo 🏃</button>
                    <button onclick="selecionarModo('batalha')" class="btn-modo">Batalha Multiplayer ⚔️</button>
                    <button onclick="mostrarRanking('tela-modo')" class="btn-modo btn-ranking">🏆 Ranking e Títulos</button>
                </div>
                <div class="qrcode-wrapper">
                    <p>Acompanhe o ranking no celular:</p>
                    <div id="qrcode-container"></div>
                </div>
            </div>

            <!-- TELA: RANKING -->
            <div id="tela-ranking" class="escondido">
                <h2>Galeria de Campeões 🏆</h2>
                <div id="lista-ranking" class="lista-ranking-container"></div>
                <hr class="divisor">
                <h3>Últimos Títulos 🏅</h3>
                <div id="lista-titulos-recentes" class="lista-ranking-container list-p"></div>
                <button onclick="fecharRanking()">Voltar</button>
            </div>

            <!-- TELA: CADASTRO -->
            <div id="tela-inicial" class="escondido">
                
                <!-- Botão de fechar/voltar -->
                <div id="btn-voltar-registro" onclick="voltarParaModos()" style="position: absolute; top: -15px; right: -15px; background: #dc3545; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 20;">✖</div>
    ...
                <h2>Registro dos Craques</h2>
                <div class="campos-cadastro">
                    <input type="text" id="input-nome1" placeholder="Nome Jogador 1">
                    <div class="botoes-avatar" id="avatar-j1">
                        <img src="img/1.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(1, 0, this)">
                        <img src="img/2.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(1, 1, this)">
                        <img src="img/3.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(1, 2, this)">
                        <img src="img/4.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(1, 3, this)">
                    </div>
                    
                    <div id="container-avatar2" class="escondido">
                        <input type="text" id="input-nome2" placeholder="Nome Jogador 2">
                        <div class="botoes-avatar" id="avatar-j2">
                            <img src="img/1.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(2, 0, this)">
                            <img src="img/2.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(2, 1, this)">
                            <img src="img/3.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(2, 2, this)">
                            <img src="img/4.jpg" class="img-avatar-opcao" onclick="selecionarAvatar(2, 3, this)">
                        </div>
                    </div>
                </div>
                <button onclick="validarComeco()">Iniciar Partida</button>
            </div>

            <!-- TELA: QUIZ -->
            <div id="tela-quiz" class="escondido">
                <div id="btn-desistir" onclick="confirmarDesistencia()">✖</div>
                
                <div class="aviso-turno-wrapper">
                    <img id="img-avatar-quiz" src="" class="avatar-circular size-p">
                    <div id="aviso-turno-nome" class="turno-destaque"></div> 
                </div>
                
                <div id="streak-popup" class="streak-msg"></div>
                <div class="progresso" id="barra-progresso">Pergunta 1 de 10</div>
                
                <h3 id="texto-pergunta">Pergunta?</h3>
                
                <!-- FEEDBACKS INCLUÍDOS AQUI -->
                <div id="feedback-acerto" class="escondido feedback-text">Gooooool!</div>
                <div id="feedback-erro" class="escondido feedback-text">Para fora!</div>
                
                <div id="area-botoes"></div>
            </div>

            <!-- TELA: RESULTADO -->
            <div id="tela-resultado" class="escondido">
                <img id="img-avatar-vencedor" src="" class="avatar-circular size-g">
                <h2 id="titulo-vencedor">Fim de Jogo!</h2>
                <p id="mensagem-final" style="white-space: pre-line;"></p>
                <!-- 👇 PESQUISA DE SATISFAÇÃO VOLTOU AQUI 👇 -->
                <div id="secao-pesquisa">
                    <p style="margin-top: 15px; font-weight: 900; color: var(--color-blue);">O que achou da experiência?</p>
                    <div class="emoji-container">
                        <span class="emoji-btn" onclick="enviarPesquisa('amei')">😍</span>
                        <span class="emoji-btn" onclick="enviarPesquisa('curti')">🙂</span>
                        <span class="emoji-btn" onclick="enviarPesquisa('mais-ou-menos')">😐</span>
                        <span class="emoji-btn" onclick="enviarPesquisa('nao-curti')">🙁</span>
                    </div>
                    <p id="feedback-agradecimento" class="escondido" style="color: var(--color-green); font-size: 16px; font-weight: 900; margin-bottom: 15px;">Obrigado pelo feedback! 🙌</p>
                </div>
                <!-- 👆 FIM DA PESQUISA 👆 -->
                <button onclick="gerarDesafio()" class="btn-desafio">🔥 Desafiar Amigo</button>
                <button onclick="mostrarRanking('tela-resultado')" class="btn-ranking">🏆 Ranking Completo</button>
                
                <button onclick="location.reload()">Novo Jogo</button>
            
            </div>
        </div>

        <!-- TIMER -->
        <div id="timer-container" class="escondido">
            <div id="timer-display" class="timer-display">Tempo: 30s</div>
        </div>
    </div>

    <!-- MODAL DESAFIO WHATSAPP/QRCODE -->
    <div id="modal-desafio" class="escondido modal-overlay" onclick="fecharModalDesafio()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="fechar-modal" onclick="fecharModalDesafio()">×</span>
            <h3>Duvido bater meu recorde! ⚽</h3>
            <div id="qrcode-desafio"></div>
        </div>
    </div>

    <!-- BOTÕES FIXOS FLUTUANTES (Apenas uma vez) -->
    <button id="btn-musica-toggle" onclick="toggleMusica()"><span id="musica-icone">🔊</span></button>
    <button id="btn-fullscreen" onclick="toggleFullscreen()"><span>↕️</span></button>

    <script src="script.js?v=PRODUCAO_FINAL_V3"></script>
</body>
</html>
