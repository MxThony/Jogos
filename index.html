<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Saminina - O Conhecimento é Campeão</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo/samininacopa.svg" alt="Logo Saminina" class="logo-marca">
        </div>

        <div class="quiz-container">
            
            <div id="tela-modo">
                <h2>Como quer jogar?</h2>
                <p>Escolha o formato da sua partida:</p>
                <div class="botoes-modo">
                    <button onclick="selecionarModo('solo')" class="btn-modo">Carreira Solo 🏃</button>
                    <button onclick="selecionarModo('batalha')" class="btn-modo">Batalha Multiplayer ⚔️</button>
                </div>
            </div>

            <div id="tela-inicial" class="escondido">
                <h2 id="titulo-cadastro">Registro</h2>
                <p id="subtitulo-cadastro">Insira os nomes para entrar em campo!</p>
                
                <div class="campos-cadastro">
                    <input type="text" id="input-nome1" placeholder="Nome do Jogador 1" autocomplete="off">
                    <div id="container-nome2">
                        <input type="text" id="input-nome2" placeholder="Nome do Jogador 2" autocomplete="off">
                    </div>
                </div>

                <button id="btn-comecar-jogo" onclick="validarComeco()">Iniciar Partida</button>
            </div>

            <div id="tela-passagem" class="escondido">
                <h2>Prepare-se!</h2>
                <p>A próxima pergunta é para:</p>
                <h1 id="nome-destaque" style="color: var(--color-yellow); font-size: 32px; margin: 20px 0; text-transform: uppercase;">Nome</h1>
                <p style="color: var(--color-wrong); font-weight: bold;">Você terá 30 segundos!</p>
                <button onclick="iniciarTurno()">Estou Pronto!</button>
            </div>

            <div id="tela-quiz" class="escondido">
                <div id="aviso-turno" class="turno-destaque"></div> 
                <div class="progresso" id="barra-progresso">Pergunta 1 de 10</div>
                
                <h3 id="texto-pergunta">Carregando...</h3>
                <div id="feedback-acerto" class="escondido feedback-text">Goooooooool!!!</div>
                <div id="feedback-erro" class="escondido feedback-text">Para fooora!</div>
                
                <div id="area-botoes"></div>
            </div>

            <div id="tela-resultado" class="escondido">
                <span class="icone-trofeu">🏆</span>
                <h2 id="titulo-vencedor">Fim de Jogo!</h2>
                <p id="mensagem-final" style="white-space: pre-line; font-weight: bold; margin: 20px 0;"></p>
                <button class="btn-reiniciar" onclick="location.reload()">Jogar Novamente</button>
            </div>

        </div>

        <div id="timer-container" class="timer-container escondido">
            <div id="timer-display" class="timer-display">Tempo: 30s</div>
        </div>
    </div>

    <button id="btn-musica-toggle" onclick="toggleMusica()">
        <span id="musica-icone">🔊</span>
    </button>

    <button id="btn-fullscreen" onclick="toggleFullscreen()">
        <span>↕️</span>
    </button>


    <script src="script.js"></script>

</body>
</html>
