<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Ao Vivo - Copa Saminina</title>
    
    <!-- Bibliotecas (Mesmas do jogo) -->
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* Estilos exclusivos para a tela de transmissão */
        .public-ranking { min-height: 100vh; padding-bottom: 60px; }
        .quiz-container { border: 4px solid var(--color-yellow); }
        
        /* Faixa de Transmissão (Marquee) */
        .faixa-transmissao {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--color-yellow);
            color: var(--color-blue);
            overflow: hidden;
            padding: 10px 0;
            font-weight: 900;
            text-transform: uppercase;
            z-index: 2000;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }
        @keyframes marquee {
            0%   { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }
    </style>
</head>
<body class="public-ranking">
    <div class="main-wrapper">
        <div class="logo-container">
            <img src="logo/samininacopa.svg" class="logo-marca">
        </div>

        <div class="quiz-container">
            <h2 style="font-size: 22px;">Placar Oficial 🏆</h2>
            <div id="lista-ranking" class="lista-ranking-container"></div>
            
            <hr class="divisor">
            
            <h3>Últimas Conquistas 🏅</h3>
            <div id="lista-titulos-recentes" class="lista-ranking-container"></div>
        </div>
    </div>

    <!-- Letreiro Passando -->
    <div class="faixa-transmissao">
        <div class="marquee-content">
            ⚽ VOCÊ ESTÁ ACOMPANHANDO A COPA SAMININA AO VIVO • QUEM SERÁ O PRÓXIMO CRAQUE? • DESAFIE SEUS AMIGOS NO TOTEM! ⚽
        </div>
    </div>

    <!-- Script de Inicialização Direta -->
    <script src="script.js"></script>
    <script>
        // Quando a página carregar, força a abertura do ranking sem os botões
        document.addEventListener("DOMContentLoaded", () => {
            mostrarRanking();
            // Esconde elementos que não pertencem à tela pública (blindagem extra)
            const btnVoltar = document.querySelector("#tela-ranking button");
            if(btnVoltar) btnVoltar.style.display = "none";
        });
    </script>
</body>
</html>
